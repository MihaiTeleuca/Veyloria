<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Synthexia | The Ultimate Discord Experience</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2245%22 fill=%22%23080112%22 stroke=%22%238A2BE2%22 stroke-width=%228%22/><text x=%2250%22 y=%2268%22 font-family=%22Orbitron, sans-serif%22 font-size=%2255%22 font-weight=%22bold%22 fill=%22%23d1b3ff%22 text-anchor=%22middle%22>S</text></svg>">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;700&display=swap');

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #080112; }
        ::-webkit-scrollbar-thumb { background: #8A2BE2; border-radius: 10px; }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #080112; color: #ffffff;
            font-family: 'Rajdhani', sans-serif;
            overflow-x: hidden; min-height: 100vh;
            cursor: none; 
        }

        /* Fundal Plasma Orbs */
        .orb {
            position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.3;
            animation: float 20s infinite alternate ease-in-out; z-index: 1; pointer-events: none;
        }
        .orb-1 { width: 40vw; height: 40vw; background: #8A2BE2; top: -10%; left: -10%; }
        .orb-2 { width: 50vw; height: 50vw; background: #4B0082; bottom: 10%; right: -10%; animation-delay: -5s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 100px) scale(1.1); }
        }

        /* Cursor Custom - Optimizat (Zero Lag) */
        @media (pointer: fine) {
            .cursor-glow {
                width: 300px; height: 300px; background: radial-gradient(circle, rgba(138,43,226,0.15) 0%, transparent 70%);
                border-radius: 50%; position: fixed; top: 0; left: 0; pointer-events: none; z-index: 9999;
                will-change: transform; transform: translate(-50%, -50%);
            }
            .cursor-dot {
                width: 6px; height: 6px; background: #fff; box-shadow: 0 0 15px #8A2BE2; border-radius: 50%;
                position: fixed; top: 0; left: 0; pointer-events: none; z-index: 10000;
                will-change: transform; transform: translate(-50%, -50%);
            }
        }
        @media (pointer: coarse) {
            body { cursor: auto; }
            .cursor-glow, .cursor-dot { display: none !important; }
        }

        /* Particule Fulgi */
        #particle-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 2; }
        .snowflake { position: absolute; background: #b05cff; border-radius: 50%; opacity: 0.5; pointer-events: none; animation: fall linear infinite; }
        @keyframes fall {
            0% { transform: translateY(-100px) scale(1); opacity: 0; }
            20% { opacity: 0.6; }
            80% { opacity: 0.6; }
            100% { transform: translateY(100vh) scale(0.3); opacity: 0; }
        }

        /* Navigare */
        nav {
            position: fixed; top: 0; width: 100%; background: rgba(8, 1, 18, 0.75); backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(138, 43, 226, 0.3); z-index: 100; padding: 15px 5%;
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;
        }
        .logo { font-family: 'Orbitron', sans-serif; font-size: 1.8rem; font-weight: 900; color: #fff; text-shadow: 0 0 15px #8A2BE2; text-decoration: none; }
        .nav-links { display: flex; gap: 20px; flex-wrap: wrap; }
        .nav-links a {
            color: #b388ff; text-decoration: none; font-size: 1rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 1px; transition: 0.3s; position: relative;
        }
        .nav-links a:hover, .nav-links a.active { color: #fff; text-shadow: 0 0 10px #8A2BE2; }

        /* Container Principal */
        main { position: relative; z-index: 10; padding-top: 120px; display: flex; flex-direction: column; align-items: center; text-align: center; width: 100%; }

        .glitch-title {
            font-family: 'Orbitron', sans-serif; font-size: clamp(3rem, 8vw, 6.5rem); font-weight: 900; text-transform: uppercase;
            color: #fff; text-shadow: 0 0 20px #8A2BE2, 0 0 50px #9932CC; margin-bottom: 10px; line-height: 1.1;
            padding: 0 10px; animation: pulseTitle 3s infinite alternate;
        }
        @keyframes pulseTitle { 0% { text-shadow: 0 0 15px #8A2BE2; } 100% { text-shadow: 0 0 30px #b05cff, 0 0 70px #8A2BE2; } }

        .typewriter-container {
            font-size: clamp(1.2rem, 3vw, 1.8rem); color: #B19CD9; letter-spacing: 3px; font-family: 'Orbitron', sans-serif;
            margin-bottom: 40px; min-height: 40px; padding: 0 15px;
        }
        .cursor-blink { animation: blink 1s infinite; color: #fff; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        .invite-btn {
            display: inline-block; padding: 15px 40px; background: rgba(138, 43, 226, 0.1);
            border: 1px solid #8A2BE2; border-radius: 5px; color: #fff; font-family: 'Orbitron', sans-serif;
            font-size: clamp(1rem, 2.5vw, 1.4rem); font-weight: 700; text-transform: uppercase; text-decoration: none;
            letter-spacing: 2px; position: relative; overflow: hidden; transition: 0.5s;
            box-shadow: 0 0 20px rgba(138, 43, 226, 0.3); margin-bottom: 60px;
        }
        .invite-btn:hover { background: #8A2BE2; box-shadow: 0 0 40px #8A2BE2; transform: scale(1.05); }

        /* Dashboard & Stats Grid */
        .dashboard-grid {
            display: flex; gap: 40px; align-items: center; justify-content: center;
            flex-wrap: wrap; width: 100%; max-width: 1200px; padding: 0 5%; margin-bottom: 80px;
        }

        .stats-container { display: flex; flex-direction: column; gap: 20px; width: 100%; max-width: 350px; }
        .stat-box {
            background: rgba(15, 3, 26, 0.6); backdrop-filter: blur(10px); border-left: 4px solid #8A2BE2;
            padding: 20px; border-radius: 10px; text-align: left; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .stat-number { font-family: 'Orbitron', sans-serif; font-size: 2.5rem; font-weight: 900; color: #fff; text-shadow: 0 0 10px #8A2BE2; }
        .stat-label { font-size: 1rem; color: #b388ff; text-transform: uppercase; letter-spacing: 1px; }

        /* Terminal 3D */
        .terminal-wrapper { perspective: 1000px; width: 100%; max-width: 500px; }
        .terminal {
            background: rgba(5, 1, 10, 0.85); border: 1px solid rgba(138, 43, 226, 0.4);
            border-radius: 10px; width: 100%; padding: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            font-family: 'Fira Code', monospace; text-align: left; transform-style: preserve-3d; transition: transform 0.1s ease-out;
        }
        .terminal-header { display: flex; gap: 8px; border-bottom: 1px solid rgba(138, 43, 226, 0.3); padding-bottom: 10px; margin-bottom: 15px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .dot-red { background: #ff5f56; } .dot-yel { background: #ffbd2e; } .dot-grn { background: #27c93f; }
        .term-line { margin-bottom: 10px; font-size: clamp(0.85rem, 2vw, 1rem); line-height: 1.5; color: #a5a5a5; word-wrap: break-word; }
        .term-user { color: #b05cff; font-weight: bold; }
        .term-cmd { color: #fff; }
        .term-output { color: #27c93f; }
        .term-system { color: #8A2BE2; font-style: italic; }

        /* Butonul Discord Plutitor */
        .discord-floating-btn {
            position: fixed; bottom: 30px; right: 30px; width: 65px; height: 65px;
            background: rgba(138, 43, 226, 0.2); backdrop-filter: blur(10px);
            border: 2px solid #8A2BE2; border-radius: 50%; display: flex; justify-content: center; align-items: center;
            z-index: 1000; box-shadow: 0 0 20px rgba(138, 43, 226, 0.5);
            transition: all 0.4s ease; animation: discordPulse 2s infinite; text-decoration: none;
        }
        .discord-floating-btn svg { width: 35px; height: 35px; fill: #ffffff; transition: all 0.4s ease; }
        
        .discord-floating-btn:hover {
            background: #8A2BE2; transform: scale(1.15) translateY(-5px);
            box-shadow: 0 0 30px #8A2BE2, 0 0 60px #9932CC; animation: none;
        }
        .discord-floating-btn:hover svg { transform: scale(1.1) rotate(-8deg); }

        @keyframes discordPulse {
            0% { box-shadow: 0 0 15px rgba(138, 43, 226, 0.4); transform: scale(1); }
            50% { box-shadow: 0 0 30px rgba(138, 43, 226, 0.8); transform: scale(1.05); }
            100% { box-shadow: 0 0 15px rgba(138, 43, 226, 0.4); transform: scale(1); }
        }

        /* Media Queries pentru Telefoane */
        @media (max-width: 768px) {
            nav { justify-content: center; flex-direction: column; gap: 15px; padding: 15px; }
            .nav-links { justify-content: center; }
            main { padding-top: 150px; }
            .terminal { padding: 15px; }
            
            /* Ajustare Buton Discord pe Mobil */
            .discord-floating-btn { bottom: 20px; right: 20px; width: 55px; height: 55px; }
            .discord-floating-btn svg { width: 28px; height: 28px; }
        }
    </style>
</head>

    <script>
        // Cursor Custom - Optimizat (Zero Lag prin Hardware Acceleration)
        if (window.matchMedia("(pointer: fine)").matches) {
            const cursorGlow = document.getElementById('cursor-glow');
            const cursorDot = document.getElementById('cursor-dot');
            let mouseX = window.innerWidth / 2;
            let mouseY = window.innerHeight / 2;
            let glowX = mouseX;
            let glowY = mouseY;

            document.addEventListener('mousemove', (e) => {
                mouseX = e.clientX;
                mouseY = e.clientY;
                cursorDot.style.transform = `translate3d(${mouseX}px, ${mouseY}px, 0) translate(-50%, -50%)`;
            });

            function renderCursor() {
                glowX += (mouseX - glowX) * 0.15;
                glowY += (mouseY - glowY) * 0.15;
                cursorGlow.style.transform = `translate3d(${glowX}px, ${glowY}px, 0) translate(-50%, -50%)`;
                requestAnimationFrame(renderCursor);
            }
            requestAnimationFrame(renderCursor);
        }

        // Efect Fulgi
        const container = document.getElementById('particle-container');
        const particleCount = window.innerWidth > 768 ? 50 : 25; 
        for (let i = 0; i < particleCount; i++) {
            let sf = document.createElement('div'); sf.classList.add('snowflake');
            sf.style.width = sf.style.height = (Math.random() * 4 + 1) + 'px';
            sf.style.left = Math.random() * 100 + 'vw';
            sf.style.animationDuration = (Math.random() * 15 + 10) + 's';
            sf.style.animationDelay = (Math.random() * 10) + 's';
            container.appendChild(sf);
        }

        // Typewriter Effect
        const phrases = ["Dominate the Market.", "Build Your Empire.", "Immaculate Output.", "The Absolute Pinnacle."];
        let i = 0, j = 0, isDeleting = false;
        const textTarget = document.getElementById("typewriter-text");

        function loop() {
            textTarget.innerHTML = phrases[i].substring(0, j);
            if (!isDeleting && j < phrases[i].length) {
                j++; setTimeout(loop, Math.random() * 50 + 50);
            } else if (isDeleting && j > 0) {
                j--; setTimeout(loop, Math.random() * 30 + 30);
            } else if (j === phrases[i].length) {
                isDeleting = true; setTimeout(loop, 2000);
            } else if (j === 0) {
                isDeleting = false; i = (i + 1) % phrases.length; setTimeout(loop, 500);
            }
        }
        loop();

        // Live Stats
        const counters = document.querySelectorAll('.stat-number');
        counters.forEach(counter => {
            const updateCount = () => {
                const target = +counter.getAttribute('data-target');
                const count = +counter.innerText;
                const speed = target / 50; 
                if (count < target) {
                    counter.innerText = Math.ceil(count + speed);
                    setTimeout(updateCount, 40);
                } else {
                    counter.innerText = target + (target > 100 ? "+" : "%");
                }
            };
            updateCount();
        });

        // 3D Tilt Terminal
        if (window.matchMedia("(min-width: 768px)").matches) {
            const terminal = document.getElementById('tilt-terminal');
            document.addEventListener('mousemove', (e) => {
                let xAxis = (window.innerWidth / 2 - e.pageX) / 50;
                let yAxis = (window.innerHeight / 2 - e.pageY) / 50;
                terminal.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
            });
        }
    </script>
