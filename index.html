<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synthexia | The Ultimate Discord Experience</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;700&display=swap');

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #080112; }
        ::-webkit-scrollbar-thumb { background: #8A2BE2; border-radius: 10px; box-shadow: 0 0 10px #8A2BE2; }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none; /* Cursor Custom */
        }

        body {
            background: linear-gradient(-45deg, #0f021a, #1a052e, #080112, #240b3d);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #ffffff;
            font-family: 'Rajdhani', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Cursor Custom Interactiv */
        .cursor-glow {
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(138,43,226,0.15) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%; position: fixed; pointer-events: none;
            transform: translate(-50%, -50%); z-index: 9999; transition: width 0.2s, height 0.2s;
        }
        .cursor-dot {
            width: 8px; height: 8px; background: #d1b3ff;
            box-shadow: 0 0 10px #fff, 0 0 20px #8A2BE2; border-radius: 50%;
            position: fixed; pointer-events: none; transform: translate(-50%, -50%); z-index: 10000;
        }

        /* Particule Neon / Fulgi */
        #particle-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0;
        }
        .snowflake {
            position: absolute; background: #b05cff; border-radius: 50%; opacity: 0.6; pointer-events: none; animation: fall linear infinite;
        }
        @keyframes fall {
            0% { transform: translateY(-100px) scale(1); opacity: 0; }
            20% { opacity: 0.6; }
            80% { opacity: 0.6; }
            100% { transform: translateY(100vh) scale(0.3); opacity: 0; }
        }

        /* Navigation Bar (Glassmorphism) */
        nav {
            position: fixed; top: 0; width: 100%;
            background: rgba(10, 2, 20, 0.7); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(138, 43, 226, 0.3);
            z-index: 100; padding: 20px 50px;
            display: flex; justify-content: space-between; align-items: center;
        }
        
        .logo {
            font-family: 'Orbitron', sans-serif; font-size: 1.8rem; font-weight: 700;
            color: #fff; text-shadow: 0 0 10px #8A2BE2; text-decoration: none;
        }

        .nav-links { display: flex; gap: 30px; }
        .nav-links a {
            color: #d1b3ff; text-decoration: none; font-size: 1.2rem; font-weight: 500;
            text-transform: uppercase; letter-spacing: 2px; transition: 0.3s;
            position: relative;
        }
        .nav-links a::after {
            content: ''; position: absolute; width: 0; height: 2px;
            background: #8A2BE2; bottom: -5px; left: 0; transition: 0.3s;
        }
        .nav-links a:hover { color: #fff; text-shadow: 0 0 10px #8A2BE2; }
        .nav-links a:hover::after { width: 100%; box-shadow: 0 0 10px #8A2BE2; }
        .nav-links a.active { color: #fff; text-shadow: 0 0 10px #8A2BE2; }
        .nav-links a.active::after { width: 100%; box-shadow: 0 0 10px #8A2BE2; }

        /* Hero Section (Centrat pe tot ecranul) */
        .hero {
            flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center;
            position: relative; z-index: 10; text-align: center; padding: 0 20px;
            margin-top: 80px; /* Offset for navbar */
        }

        .glitch-title {
            font-family: 'Orbitron', sans-serif; font-size: 6rem; font-weight: 900;
            text-transform: uppercase; color: #fff;
            text-shadow: 0 0 15px #8A2BE2, 0 0 40px #9932CC;
            animation: pulseGlow 2s infinite alternate; margin-bottom: 10px;
        }
        @keyframes pulseGlow {
            0% { text-shadow: 0 0 15px #8A2BE2, 0 0 30px #9932CC; transform: scale(1); }
            100% { text-shadow: 0 0 25px #b05cff, 0 0 60px #8A2BE2, 0 0 80px #4B0082; transform: scale(1.02); }
        }

        .hero-subtitle {
            font-size: 1.8rem; color: #B19CD9; letter-spacing: 5px;
            margin-bottom: 40px; text-transform: uppercase;
        }

        /* Buton de Invitație Suprem */
        .invite-btn {
            display: inline-block; padding: 18px 45px;
            background: transparent; border: 2px solid #8A2BE2; border-radius: 50px;
            color: #fff; font-family: 'Orbitron', sans-serif; font-size: 1.5rem; font-weight: 700;
            text-transform: uppercase; text-decoration: none; letter-spacing: 2px;
            position: relative; overflow: hidden; transition: all 0.4s ease;
            box-shadow: 0 0 20px rgba(138, 43, 226, 0.4);
        }
        
        .invite-btn::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(138, 43, 226, 0.5), transparent);
            transition: all 0.5s ease; z-index: -1;
        }

        .invite-btn:hover {
            background: #8A2BE2; box-shadow: 0 0 40px #8A2BE2, 0 0 80px #9932CC; transform: translateY(-5px);
        }
        .invite-btn:hover::before { left: 100%; }

        /* Quick Features */
        .quick-features {
            display: flex; gap: 40px; margin-top: 80px; justify-content: center; flex-wrap: wrap;
        }
        .feature-badge {
            background: rgba(20, 5, 35, 0.6); backdrop-filter: blur(10px);
            border: 1px solid rgba(138, 43, 226, 0.3); border-radius: 15px;
            padding: 15px 30px; font-size: 1.1rem; color: #e0ccff;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3); transition: 0.3s;
        }
        .feature-badge:hover {
            border-color: #8A2BE2; transform: translateY(-5px); box-shadow: 0 10px 20px rgba(138, 43, 226, 0.2);
        }
        .feature-badge strong { color: #fff; font-family: 'Orbitron', sans-serif; }

    </style>
</head>
<body>

    <!-- Elemente Cursor Custom -->
    <div class="cursor-glow" id="cursor-glow"></div>
    <div class="cursor-dot" id="cursor-dot"></div>

    <!-- Container Fulgi -->
    <div id="particle-container"></div>

    <!-- Meniul de Navigare (Conectează paginile) -->
    <nav>
        <a href="index.html" class="logo">SYNTHEXIA</a>
        <div class="nav-links">
            <a href="index.html" class="active">Home</a>
            <a href="about.html">About</a>
            <a href="tos.html">T.O.S</a>
        </div>
    </nav>

    <!-- Sectiunea Principala -->
    <main class="hero">
        <h1 class="glitch-title">SYNTHEXIA</h1>
        <p class="hero-subtitle">The Absolute Pinnacle of Discord Economy</p>
        
        <!-- Aici vei pune link-ul real de la botul tau (OAuth2 din Discord Developer Portal) -->
        <a href="#" class="invite-btn">Invite To Server</a>

        <div class="quick-features">
            <div class="feature-badge"><strong>100% Native</strong> Architecture</div>
            <div class="feature-badge"><strong>BankLocked</strong> Protocol</div>
            <div class="feature-badge"><strong>Immaculate</strong> Interface Output</div>
        </div>
    </main>

    <script>
        // Cursor Custom
        const cursorGlow = document.getElementById('cursor-glow');
        const cursorDot = document.getElementById('cursor-dot');
        document.addEventListener('mousemove', (e) => {
            cursorGlow.style.left = e.clientX + 'px'; cursorGlow.style.top = e.clientY + 'px';
            cursorDot.style.left = e.clientX + 'px'; cursorDot.style.top = e.clientY + 'px';
        });

        // Generare Fulgi (Particule)
        function createSnowflakes() {
            const container = document.getElementById('particle-container');
            const particleCount = 60;
            for (let i = 0; i < particleCount; i++) {
                let snowflake = document.createElement('div');
                snowflake.classList.add('snowflake');
                let size = Math.random() * 4 + 1; 
                snowflake.style.width = size + 'px'; snowflake.style.height = size + 'px';
                snowflake.style.left = Math.random() * 100 + 'vw';
                let duration = Math.random() * 15 + 10; 
                snowflake.style.animationDuration = duration + 's';
                snowflake.style.animationDelay = Math.random() * 10 + 's';
                container.appendChild(snowflake);
            }
        }
        window.onload = createSnowflakes;
    </script>
</body>
</html>
